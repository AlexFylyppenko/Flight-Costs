<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Облік · Дрони / БК</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0f14" />

  <!-- iOS встановлення на головний екран -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Облік БК" />
  <link rel="apple-touch-icon" href="icon-180.png" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0c0f14; overscroll-behavior: none; }
    body { font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    input, select { outline: none; font-family: inherit; }
    button { font-family: inherit; }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .35; }
    @keyframes popAnim { 0% { transform: scale(1);} 40% { transform: scale(.82);} 100% { transform: scale(1);} }
    .pop:active { animation: popAnim .22s ease; filter: brightness(1.35); }

    /* Анімований прапор України з хвилями, що пробігають полотном */
    .ua-flag {
      display: flex;
      width: 48px;
      height: 32px;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      flex-shrink: 0;
    }
    .ua-seg {
      flex: 1;
      display: flex;
      flex-direction: column;
      animation: flagWaveSeg 1.4s ease-in-out infinite;
    }
    .ua-seg:nth-child(1) { animation-delay: 0s; }
    .ua-seg:nth-child(2) { animation-delay: .1s; }
    .ua-seg:nth-child(3) { animation-delay: .2s; }
    .ua-seg:nth-child(4) { animation-delay: .3s; }
    .ua-seg:nth-child(5) { animation-delay: .4s; }
    .ua-seg:nth-child(6) { animation-delay: .5s; }
    .ua-seg:nth-child(7) { animation-delay: .6s; }
    .ua-seg:nth-child(8) { animation-delay: .7s; }
    .ua-blue { height: 50%; background: linear-gradient(180deg, #1f6fd6, #2a86f0); }
    .ua-yellow { height: 50%; background: linear-gradient(180deg, #f5d020, #ffd700); }
    @keyframes flagWaveSeg {
      0%   { transform: translateY(0) scaleY(1); }
      25%  { transform: translateY(-2px) scaleY(1.04); }
      50%  { transform: translateY(0) scaleY(1); }
      75%  { transform: translateY(2px) scaleY(.96); }
      100% { transform: translateY(0) scaleY(1); }
    }
    /* безпечні зони iPhone (вирізи, острівець Dynamic Island, домашня смуга) */
    #root { padding-bottom: env(safe-area-inset-bottom); }
    /* верхній відступ під острівець/виріз; не менше 12px навіть без вирізу */
    header { padding-top: max(18px, calc(env(safe-area-inset-top) + 8px)) !important; justify-content: space-between; }
    /* у горизонтальному режимі острівець/виріз зміщується вбік — додаємо бічні відступи */
    @media screen and (orientation: landscape) {
      #root {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    /* Заборона виділення тексту інтерфейсу та системного меню (Copy/Look Up) при довгому натисканні.
       Поля вводу — виняток, у них виділення лишається. */
    * {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }

    /* Горизонтальний режим: три колонки за схемою, зменшений масштаб. */
    @media screen and (orientation: landscape) {
      #root > div { max-width: none !important; }
      /* зменшення масштабу всього вмісту приблизно в 1.3 раза */
      .main-content { font-size: 0.78rem !important; padding: 4px 12px 16px !important; }
      .stock-layout {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
        align-items: start;
      }
      .stock-col { min-width: 0; }

      /* Заголовок застосунку — менший у горизонтальному режимі (приблизно вдвічі) */
      header { padding-top: max(8px, env(safe-area-inset-top)) !important; padding-bottom: 6px !important; }
      header svg { width: 16px !important; height: 16px !important; }
      .app-title { font-size: 11px !important; }
      .app-sub { font-size: 8px !important; }

      /* Спливаючі вікна — по центру екрана та компактніші */
      .modal-overlay { align-items: center !important; }
      .modal-sheet {
        max-width: 420px !important;
        border-radius: 16px !important;
        font-size: 0.85rem;
        max-height: 82vh !important;
        padding-bottom: 18px !important;
      }

      /* Кнопки "Надходження" та "Компонент" — компактніші, щоб не виходили за межі колонки */
      .action-buttons { gap: 6px !important; }
      .action-buttons button {
        font-size: 11px !important;
        padding: 8px 6px !important;
        gap: 4px !important;
      }
      .action-buttons button svg { width: 13px !important; height: 13px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react" src="app.js"></script>

  <script>
    // Реєстрація service worker + автоматичне оновлення
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          // періодична перевірка нової версії (раз на годину, поки застосунок відкритий)
          setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
          // якщо знайдено нову версію — вона встановиться у фоні
        }).catch(() => {});

        // Коли новий service worker перебрав контроль — перезавантажуємо сторінку один раз,
        // щоб показати свіжу версію без ручних дій.
        let reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloaded) return;
          reloaded = true;
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
