<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Облік · Дрони / БК</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0f14" />

  <!-- iOS встановлення на головний екран -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Облік БК" />
  <link rel="apple-touch-icon" href="icon-180.png" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0c0f14; overscroll-behavior: none; }
    body { font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    input, select { outline: none; font-family: inherit; }
    button { font-family: inherit; }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .35; }
    @keyframes popAnim { 0% { transform: scale(1);} 40% { transform: scale(.82);} 100% { transform: scale(1);} }
    .pop:active { animation: popAnim .22s ease; filter: brightness(1.35); }
    /* безпечні зони iPhone (вирізи, острівець Dynamic Island, домашня смуга) */
    #root { padding-bottom: env(safe-area-inset-bottom); }
    /* верхній відступ під острівець/виріз; не менше 12px навіть без вирізу */
    header { padding-top: max(18px, calc(env(safe-area-inset-top) + 8px)) !important; }
    /* у горизонтальному режимі острівець/виріз зміщується вбік — додаємо бічні відступи */
    @media screen and (orientation: landscape) {
      #root {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    /* Заборона виділення тексту інтерфейсу та системного меню (Copy/Look Up) при довгому натисканні.
       Поля вводу — виняток, у них виділення лишається. */
    * {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }

    /* Горизонтальний режим: три колонки за схемою, зменшений масштаб,
       компоненти всередині категорій — у кілька стовпців. */
    @media screen and (orientation: landscape) {
      #root > div { max-width: none !important; }
      /* зменшення масштабу всього вмісту приблизно в 1.3 раза */
      .main-content { font-size: 0.78rem !important; padding: 4px 12px 16px !important; }
      .stock-layout {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
        align-items: start;
      }
      .stock-col { min-width: 0; }
      /* компоненти всередині категорії — у 2 стовпці, щоб не доводилось гортати */
      .comp-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
    }
    /* широкий екран — компоненти у 3 стовпці */
    @media screen and (orientation: landscape) and (min-width: 1000px) {
      .comp-list { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react" src="app.js"></script>

  <script>
    // Реєстрація service worker + автоматичне оновлення
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          // періодична перевірка нової версії (раз на годину, поки застосунок відкритий)
          setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
          // якщо знайдено нову версію — вона встановиться у фоні
        }).catch(() => {});

        // Коли новий service worker перебрав контроль — перезавантажуємо сторінку один раз,
        // щоб показати свіжу версію без ручних дій.
        let reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloaded) return;
          reloaded = true;
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
